name: Validation Dashboard

# Runs the full validation dashboard on every push and PR. Reports
# health status, SOI calibration coverage, and the CBO/JCT distributional
# benchmark suite. Publishes the --json output as a workflow artifact
# so regressions are diffable across runs.
#
# Gate behavior (exit codes from scripts/run_validation_dashboard.py):
#   0 — everything nominal; CI job passes.
#   1 — a health component is degraded OR a benchmark is rated
#       needs_improvement; CI job FAILS so the PR cannot merge.
#   2 — calibration warning (a single bracket <60% AGI coverage); CI job
#       still passes. This is a data-quality signal, not a regression.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Run validation dashboard (human-readable)
        run: |
          set +e
          python scripts/run_validation_dashboard.py
          exit_code=$?
          echo ""
          if [ $exit_code -eq 0 ]; then
            echo "Dashboard: all green."
          elif [ $exit_code -eq 2 ]; then
            echo "Dashboard: calibration warning (data-quality signal, not a regression)."
          else
            echo "Dashboard: FAIL — see dashboard output above."
            exit $exit_code
          fi

      - name: Run validation dashboard (JSON)
        if: always()
        run: |
          python scripts/run_validation_dashboard.py --json > validation-dashboard.json || true

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: validation-dashboard
          path: validation-dashboard.json
          retention-days: 30
