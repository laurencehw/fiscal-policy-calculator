name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check fiscal_model/ tests/ --output-format=github

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=fiscal_model --cov-report=term-missing --cov-fail-under=60

      - name: Export dependency lock snapshot
        run: |
          pip freeze --exclude-editable > requirements-lock-ci.txt

      - name: Upload lock snapshot
        uses: actions/upload-artifact@v6
        with:
          name: requirements-lock-${{ matrix.python-version }}
          path: requirements-lock-ci.txt
