name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install pytest

      - name: Run Streamlit smoke tests
        run: |
          pytest tests/test_app_entrypoints.py tests/test_ui_controller_smoke.py -q

  readiness:
    # Release-readiness gate on the production-style runtime. Strict mode blocks
    # model/runtime warnings while tolerating documented offline data fallbacks.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install locked production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Run release readiness gate
        run: |
          python scripts/check_readiness.py --strict

      - name: Write readiness report
        if: always()
        run: |
          python scripts/check_readiness.py --json > readiness-report.json
        continue-on-error: true

      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: readiness-report
          path: readiness-report.json
          if-no-files-found: ignore

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check fiscal_model/ tests/ --output-format=github

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=fiscal_model --cov-report=term-missing

      - name: Export dependency lock snapshot
        run: |
          pip freeze --exclude-editable > requirements-lock-ci.txt

      - name: Upload lock snapshot
        uses: actions/upload-artifact@v6
        with:
          name: requirements-lock-${{ matrix.python-version }}
          path: requirements-lock-ci.txt

  lockfile:
    # Verifies that requirements-lock.txt is installable and consistent
    # with requirements.txt. Pinned to Python 3.12 (the Streamlit Cloud
    # runtime) so the lock reflects the production deployment target.
    #
    # History: this job went through two pip-tools / pip API drift
    # breakages in a row (PackageFinder.allow_all_prereleases, then
    # InstallRequirement.use_pep517). The root cause was that pip-tools
    # reaches into pip's private API, which evolves between pip minor
    # releases and breaks unpredictably under setup-python@v6 which
    # bundles whatever pip is current at action version time.
    #
    # Current strategy: don't regenerate in CI at all. We verify instead
    # that (a) the lockfile installs cleanly from scratch and (b) every
    # top-level requirement appears pinned. Regeneration is a local
    # developer action, documented in CONTRIBUTING.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install from the lockfile (verifies it's resolvable)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Verify every requirements.txt entry is pinned in the lock
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          req_lines = Path("requirements.txt").read_text().splitlines()
          lock_text = Path("requirements-lock.txt").read_text().lower()

          missing = []
          for line in req_lines:
              line = line.split("#", 1)[0].strip()
              if not line or line.startswith("-"):
                  continue
              # Extract the bare package name — split on version operators.
              name = re.split(r"[<>=!~\[]", line, maxsplit=1)[0].strip().lower()
              if not name:
                  continue
              # Lock file normalises dashes/underscores; compare both.
              variants = {name, name.replace("_", "-"), name.replace("-", "_")}
              if not any(f"\n{v}==" in "\n" + lock_text for v in variants):
                  missing.append(name)

          if missing:
              print("::error::Packages in requirements.txt not pinned in requirements-lock.txt:")
              for m in missing:
                  print(f"  - {m}")
              print("")
              print("Regenerate the lockfile locally (see CONTRIBUTING.md):")
              print("  pip install uv")
              print("  uv pip compile --strip-extras --no-header \\")
              print("      --output-file=requirements-lock.txt requirements.txt")
              raise SystemExit(1)
          print(f"All {len(req_lines)} requirements.txt entries are pinned.")
          PY

      - name: Legacy pip-tools freshness check (informational only)
        continue-on-error: true
        run: |
          # Tries a pip-tools-free regeneration via uv. Advisory only
          # because uv and pip-tools can produce byte-different output
          # formats; a non-zero diff here just means "consider a local
          # regeneration", not a blocking failure.
          pip install uv
          uv pip compile \
            --strip-extras \
            --no-header \
            --quiet \
            --output-file=requirements-lock.uv.txt \
            requirements.txt
          if diff -q requirements-lock.txt requirements-lock.uv.txt >/dev/null 2>&1; then
            echo "Lockfile is byte-identical to a fresh uv regeneration."
          else
            echo "Note: uv regeneration differs from committed lockfile (likely formatting; not blocking)."
            diff requirements-lock.txt requirements-lock.uv.txt | head -60 || true
          fi

      - name: Final guard on regeneration guidance
        run: |
          if ! [ -f requirements-lock.txt ]; then
            echo ""
            echo "::error::requirements-lock.txt is missing."
            echo ""
            echo "Fix (Python 3.12 to match this CI job):"
            echo "  python3.12 -m venv .lockvenv"
            echo "  .lockvenv/bin/pip install uv"
            echo "  .lockvenv/bin/uv pip compile --strip-extras --no-header \\"
            echo "    --output-file=requirements-lock.txt requirements.txt"
            echo "  git add requirements-lock.txt && git commit"
            exit 1
          fi
