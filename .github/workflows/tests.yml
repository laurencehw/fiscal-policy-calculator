name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Streamlit smoke tests
        run: |
          pytest tests/test_app_entrypoints.py tests/test_ui_controller_smoke.py -q

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check fiscal_model/ tests/ --output-format=github

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=fiscal_model --cov-report=term-missing

      - name: Export dependency lock snapshot
        run: |
          pip freeze --exclude-editable > requirements-lock-ci.txt

      - name: Upload lock snapshot
        uses: actions/upload-artifact@v6
        with:
          name: requirements-lock-${{ matrix.python-version }}
          path: requirements-lock-ci.txt

  lockfile:
    # Verifies that the committed requirements-lock.txt stays in sync with
    # requirements.txt. Pinned to Python 3.12 — the version Streamlit Cloud
    # runs — so the lock file reflects the production deployment target.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Regenerate lock file in place
        run: |
          # Overwrite the checked-in lock file so pip-compile's header
          # references the same filename the committed copy was generated
          # with. A trailing git diff then surfaces any drift.
          pip-compile \
            --quiet \
            --strip-extras \
            --output-file=requirements-lock.txt \
            requirements.txt

      - name: Verify committed lock file matches
        run: |
          if ! git diff --exit-code -- requirements-lock.txt; then
            echo ""
            echo "::error::requirements-lock.txt is out of sync with requirements.txt."
            echo "This usually means either (a) you edited requirements.txt"
            echo "without running pip-compile, or (b) you regenerated the"
            echo "lock file from a Python version other than 3.12."
            echo ""
            echo "Fix from a Python 3.12 interpreter:"
            echo "  python3.12 -m venv .lockvenv"
            echo "  .lockvenv/bin/pip install pip-tools"
            echo "  .lockvenv/bin/pip-compile --strip-extras \\"
            echo "    --output-file=requirements-lock.txt requirements.txt"
            echo "  git add requirements-lock.txt && git commit"
            exit 1
          fi
