name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Streamlit smoke tests
        run: |
          pytest tests/test_app_entrypoints.py tests/test_ui_controller_smoke.py -q

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check fiscal_model/ tests/ --output-format=github

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=fiscal_model --cov-report=term-missing

      - name: Export dependency lock snapshot
        run: |
          pip freeze --exclude-editable > requirements-lock-ci.txt

      - name: Upload lock snapshot
        uses: actions/upload-artifact@v6
        with:
          name: requirements-lock-${{ matrix.python-version }}
          path: requirements-lock-ci.txt

  lockfile:
    # Verifies that the committed requirements-lock.txt stays in sync with
    # requirements.txt. Pinned to Python 3.12 — the version Streamlit Cloud
    # runs — so the lock file reflects the production deployment target.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          # Pin pip-tools so the regenerated lock file is byte-stable
          # across CI runs even when upstream releases new pip-tools
          # versions that tweak output formatting.
          pip install 'pip-tools==7.4.1'

      - name: Regenerate lock file in place
        run: |
          # Overwrite the checked-in lock file so a trailing git diff
          # surfaces any drift. ``--no-header`` strips pip-compile's
          # autogeneration comment (which embeds the Python version),
          # making the lock file independent of which Python minor
          # version generated it.
          pip-compile \
            --quiet \
            --strip-extras \
            --no-header \
            --output-file=requirements-lock.txt \
            requirements.txt

      - name: Verify committed lock file matches
        run: |
          if ! git diff --exit-code -- requirements-lock.txt; then
            echo ""
            echo "::error::requirements-lock.txt is out of sync with requirements.txt."
            echo ""
            echo "Most likely cause: you edited requirements.txt without"
            echo "regenerating the lock file."
            echo ""
            echo "Fix (any Python in the supported 3.10–3.13 range works,"
            echo "since --no-header strips the version stamp):"
            echo "  python3.12 -m venv .lockvenv"
            echo "  .lockvenv/bin/pip install 'pip-tools==7.4.1'"
            echo "  .lockvenv/bin/pip-compile --strip-extras --no-header \\"
            echo "    --output-file=requirements-lock.txt requirements.txt"
            echo "  git add requirements-lock.txt && git commit"
            exit 1
          fi
