name: FRED Seed Refresh

on:
  schedule:
    - cron: "0 10 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-fred-seed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-lock.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install pytest

      - name: Require FRED API key
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ -z "$FRED_API_KEY" ]; then
            echo "::error::Set repository secret FRED_API_KEY to refresh bundled FRED seed data."
            exit 1
          fi

      - name: Refresh bundled FRED seed
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_fred_seed.py --observations 8

      - name: Verify release readiness
        run: python scripts/check_readiness.py --strict

      - name: Run FRED seed regression tests
        run: |
          python -m pytest \
            tests/test_refresh_fred_seed_script.py \
            tests/test_data_layer.py \
            tests/test_health.py \
            tests/test_readiness.py \
            -q

      - name: Open seed refresh pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/fred-seed-refresh
          delete-branch: true
          commit-message: "chore: refresh bundled FRED seed"
          title: "Refresh bundled FRED seed"
          body: |
            Automated refresh of `fiscal_model/data_files/fred_seed.json`.

            Validation run:
            - `python scripts/check_readiness.py --strict`
            - targeted FRED seed regression tests
          add-paths: |
            fiscal_model/data_files/fred_seed.json
